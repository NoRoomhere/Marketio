<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - Signature Marketing</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1>Signature Marketing</h1>
                </a>
            </div>
            <nav class="nav">
                <a href="index.html">Головна</a>
                <a href="register.html" class="btn-register">Реєстрація</a>
            </nav>
        </div>
    </header>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Вхід</h2>
                    <p>Увійдіть до свого акаунту</p>
                </div>

                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label for="loginEmail">Email *</label>
                        <input type="email" id="loginEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Пароль *</label>
                        <input type="password" id="loginPassword" name="password" required>
                        <a href="#" class="forgot-password">Забули пароль?</a>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Запам'ятати мене</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Увійти</button>
                </form>

                <div class="auth-footer">
                    <p>Ще не маєте акаунту? <a href="register.html">Зареєструватися</a></p>
                </div>

                <!-- Success/Error Messages -->
                <div id="message" class="message"></div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Firebase Config - Must load after Firebase SDK -->
    <script>
        // Ensure Firebase SDK is loaded before config
        if (typeof firebase === 'undefined') {
            console.error('Firebase SDK не завантажено');
        }
    </script>
    <script src="firebase-config.js"></script>
    
    <!-- Auth Script - Must load after Firebase Config -->
    <script src="auth.js"></script>
</body>
</html>

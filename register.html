<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - Signature Marketing</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1>Signature Marketing</h1>
                </a>
            </div>
            <nav class="nav">
                <a href="index.html">Головна</a>
                <a href="login.html" class="btn-login">Увійти</a>
            </nav>
        </div>
    </header>

    <!-- Registration Section -->
    <section class="auth-section">
        <div class="container">
            <div class="auth-container">
                <div class="auth-header">
                    <h2>Реєстрація</h2>
                    <p>Оберіть тип акаунту</p>
                </div>

                <!-- Account Type Selector -->
                <div class="account-type-selector">
                    <button type="button" class="account-type-btn active" data-type="business">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                        <span>Я бізнес</span>
                    </button>
                    <button type="button" class="account-type-btn" data-type="blogger">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>Я блогер</span>
                    </button>
                </div>

                <!-- Business Registration Form -->
                <form id="businessForm" class="auth-form active">
                    <div class="form-group">
                        <label for="businessName">Назва компанії *</label>
                        <input type="text" id="businessName" name="businessName" required>
                    </div>

                    <div class="form-group">
                        <label for="businessEmail">Email *</label>
                        <input type="email" id="businessEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="businessPhone">Телефон *</label>
                        <input type="tel" id="businessPhone" name="phone" placeholder="+380 XX XXX XX XX" required>
                    </div>

                    <div class="form-group">
                        <label for="businessPassword">Пароль *</label>
                        <input type="password" id="businessPassword" name="password" required minlength="6">
                        <small>Мінімум 6 символів</small>
                    </div>

                    <div class="form-group">
                        <label for="businessPasswordConfirm">Підтвердіть пароль *</label>
                        <input type="password" id="businessPasswordConfirm" name="passwordConfirm" required>
                    </div>

                    <div class="form-group">
                        <label for="businessDescription">Опис бізнесу</label>
                        <textarea id="businessDescription" name="description" rows="4" placeholder="Коротко опишіть ваш бізнес"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="businessTerms" name="terms" required>
                        <label for="businessTerms">Я погоджуюсь з <a href="#" target="_blank">умовами використання</a> та <a href="#" target="_blank">політикою конфіденційності</a> *</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Зареєструватися</button>
                </form>

                <!-- Blogger Registration Form -->
                <form id="bloggerForm" class="auth-form">
                    <div class="form-group">
                        <label for="bloggerName">Ім'я та прізвище *</label>
                        <input type="text" id="bloggerName" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="bloggerEmail">Email *</label>
                        <input type="email" id="bloggerEmail" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="bloggerPhone">Телефон</label>
                        <input type="tel" id="bloggerPhone" name="phone" placeholder="+380 XX XXX XX XX">
                    </div>

                    <div class="form-group">
                        <label for="bloggerPassword">Пароль *</label>
                        <input type="password" id="bloggerPassword" name="password" required minlength="6">
                        <small>Мінімум 6 символів</small>
                    </div>

                    <div class="form-group">
                        <label for="bloggerPasswordConfirm">Підтвердіть пароль *</label>
                        <input type="password" id="bloggerPasswordConfirm" name="passwordConfirm" required>
                    </div>

                    <div class="form-group">
                        <label for="bloggerSocialMedia">Соціальні мережі</label>
                        <input type="text" id="bloggerSocialMedia" name="socialMedia" placeholder="Instagram, TikTok, YouTube (через кому)">
                    </div>

                    <div class="form-group">
                        <label for="bloggerBio">Про себе</label>
                        <textarea id="bloggerBio" name="bio" rows="4" placeholder="Розкажіть про себе та ваш контент"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="bloggerTerms" name="terms" required>
                        <label for="bloggerTerms">Я погоджуюсь з <a href="#" target="_blank">умовами використання</a> та <a href="#" target="_blank">політикою конфіденційності</a> *</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Зареєструватися</button>
                </form>

                <div class="auth-footer">
                    <p>Вже маєте акаунт? <a href="login.html">Увійти</a></p>
                </div>

                <!-- Success/Error Messages -->
                <div id="message" class="message"></div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <!-- Firebase Config - Must load after Firebase SDK -->
    <script>
        // Ensure Firebase SDK is loaded before config
        if (typeof firebase === 'undefined') {
            console.error('Firebase SDK не завантажено');
        }
    </script>
    <script src="firebase-config.js"></script>
    
    <!-- Auth Script - Must load after Firebase Config -->
    <script src="auth.js"></script>
</body>
</html>

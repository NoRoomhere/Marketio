# Marketio — Next.js 15 deploy on Netlify
# https://docs.netlify.com/frameworks/next-js/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js runtime
[plugins]
  [plugins.inputs]
    # Enable Next.js plugin for SSR, ISR, middleware
    next_runtime = "nodejs"

